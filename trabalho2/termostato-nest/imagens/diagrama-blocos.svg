<svg xmlns="http://www.w3.org/2000/svg" width="960" height="700" viewBox="0 0 960 700" font-family="Helvetica, Arial, sans-serif">
  <rect width="960" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">Termostato com ESP32 — Diagrama de blocos</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#666666">Reprodução simplificada do Nest com componentes do kit da disciplina</text>

  <!-- ===== Central: ESP32 ===== -->
  <rect x="385" y="250" width="190" height="150" rx="10" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  <text x="480" y="305" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">ESP32</text>
  <text x="480" y="332" text-anchor="middle" font-size="12" fill="#9fe2bf">Wi-Fi · BLE</text>
  <text x="480" y="352" text-anchor="middle" font-size="12" fill="#9fe2bf">FreeRTOS (ESP-IDF)</text>
  <text x="480" y="372" text-anchor="middle" font-size="12" fill="#cfd8dc">Controle por histerese</text>

  <!-- ===== Left column: sensores (entradas) ===== -->
  <!-- DS18B20 -->
  <rect x="25" y="100" width="275" height="52" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="40" y="123" font-size="14" font-weight="bold" fill="#0d47a1">DS18B20</text>
  <text x="40" y="141" font-size="11.5" fill="#37474f">Temperatura (variável de processo)</text>
  <line x1="300" y1="126" x2="385" y2="285" stroke="#1976d2" stroke-width="1.5"/>
  <text x="333" y="205" text-anchor="middle" font-size="11" fill="#1976d2" font-weight="bold">1-Wire</text>

  <!-- BMP280 -->
  <rect x="25" y="170" width="275" height="52" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="40" y="193" font-size="14" font-weight="bold" fill="#0d47a1">BMP280 <tspan font-weight="normal" font-size="11" fill="#607d8b">(opcional)</tspan></text>
  <text x="40" y="211" font-size="11.5" fill="#37474f">Pressão + temperatura</text>
  <line x1="300" y1="196" x2="385" y2="300" stroke="#1976d2" stroke-width="1.5"/>
  <text x="345" y="240" text-anchor="middle" font-size="11" fill="#1976d2" font-weight="bold">I²C</text>

  <!-- PIR -->
  <rect x="25" y="240" width="275" height="52" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="40" y="263" font-size="14" font-weight="bold" fill="#0d47a1">Sensor de Movimento (PIR)</text>
  <text x="40" y="281" font-size="11.5" fill="#37474f">Presença — Auto-Away</text>
  <line x1="300" y1="266" x2="385" y2="320" stroke="#1976d2" stroke-width="1.5"/>
  <text x="345" y="285" text-anchor="middle" font-size="11" fill="#1976d2" font-weight="bold">GPIO</text>

  <!-- LDR -->
  <rect x="25" y="310" width="275" height="52" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="40" y="333" font-size="14" font-weight="bold" fill="#0d47a1">Foto-resistor (LDR)</text>
  <text x="40" y="351" font-size="11.5" fill="#37474f">Luz ambiente — brilho do display</text>
  <line x1="300" y1="336" x2="385" y2="345" stroke="#1976d2" stroke-width="1.5"/>
  <text x="345" y="326" text-anchor="middle" font-size="11" fill="#1976d2" font-weight="bold">ADC</text>

  <!-- ===== Right column: interface + saidas ===== -->
  <!-- OLED -->
  <rect x="660" y="110" width="275" height="52" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="675" y="133" font-size="14" font-weight="bold" fill="#1b5e20">Tela OLED 0,96"</text>
  <text x="675" y="151" font-size="11.5" fill="#37474f">Exibe temperatura atual / alvo / modo</text>
  <line x1="575" y1="285" x2="660" y2="136" stroke="#388e3c" stroke-width="1.5"/>
  <text x="625" y="206" text-anchor="middle" font-size="11" fill="#388e3c" font-weight="bold">I²C</text>

  <!-- Encoder -->
  <rect x="660" y="180" width="275" height="52" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="675" y="203" font-size="14" font-weight="bold" fill="#1b5e20">Encoder Rotativo + Botão</text>
  <text x="675" y="221" font-size="11.5" fill="#37474f">Ajuste do setpoint (anel do Nest)</text>
  <line x1="575" y1="300" x2="660" y2="206" stroke="#388e3c" stroke-width="1.5"/>
  <text x="623" y="244" text-anchor="middle" font-size="11" fill="#388e3c" font-weight="bold">GPIO</text>

  <!-- LED RGB -->
  <rect x="660" y="250" width="275" height="52" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="675" y="273" font-size="14" font-weight="bold" fill="#1b5e20">Led RGB</text>
  <text x="675" y="291" font-size="11.5" fill="#37474f">Estado: aquece / resfria / eco</text>
  <line x1="575" y1="320" x2="660" y2="276" stroke="#388e3c" stroke-width="1.5"/>
  <text x="623" y="312" text-anchor="middle" font-size="11" fill="#388e3c" font-weight="bold">GPIO</text>

  <!-- Relay -->
  <rect x="660" y="320" width="275" height="52" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="675" y="343" font-size="14" font-weight="bold" fill="#bf360c">Relé 1 / 2 canais</text>
  <text x="675" y="361" font-size="11.5" fill="#37474f">Liga/desliga aquecimento e refrigeração</text>
  <line x1="575" y1="345" x2="660" y2="346" stroke="#e65100" stroke-width="1.5"/>
  <text x="623" y="335" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">GPIO</text>

  <!-- HVAC -->
  <rect x="660" y="410" width="275" height="46" rx="8" fill="#fbe9e7" stroke="#bf360c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="797" y="438" text-anchor="middle" font-size="13" font-weight="bold" fill="#bf360c">Carga HVAC (simulada)</text>
  <line x1="797" y1="372" x2="797" y2="410" stroke="#bf360c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Bottom: conectividade / nuvem ===== -->
  <rect x="385" y="480" width="190" height="54" rx="8" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
  <text x="480" y="502" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#263238">App / Broker MQTT</text>
  <text x="480" y="520" text-anchor="middle" font-size="11.5" fill="#37474f">Controle e monitoramento remotos</text>
  <line x1="480" y1="400" x2="480" y2="480" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="512" y="445" font-size="11" fill="#546e7a" font-weight="bold">Wi-Fi</text>

  <!-- Power note -->
  <rect x="385" y="572" width="190" height="46" rx="8" fill="#fffde7" stroke="#f9a825" stroke-width="1.5"/>
  <text x="480" y="594" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#7f6000">Fonte dedicada (USB)</text>
  <text x="480" y="611" text-anchor="middle" font-size="11" fill="#37474f">(substitui o power stealing)</text>
  <line x1="480" y1="534" x2="480" y2="572" stroke="#f9a825" stroke-width="1.5"/>

  <!-- Legend -->
  <text x="40" y="430" font-size="12" font-weight="bold" fill="#37474f">Legenda:</text>
  <rect x="40" y="440" width="16" height="14" fill="#e3f2fd" stroke="#1976d2"/>
  <text x="62" y="452" font-size="11.5" fill="#37474f">Sensores (entradas)</text>
  <rect x="40" y="460" width="16" height="14" fill="#e8f5e9" stroke="#388e3c"/>
  <text x="62" y="472" font-size="11.5" fill="#37474f">Interface / saída</text>
  <rect x="40" y="480" width="16" height="14" fill="#fff3e0" stroke="#e65100"/>
  <text x="62" y="492" font-size="11.5" fill="#37474f">Atuação / HVAC</text>

  <!-- arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#455a64"/>
    </marker>
  </defs>
</svg>
