<svg xmlns="http://www.w3.org/2000/svg" width="940" height="660" viewBox="0 0 940 660" font-family="Helvetica, Arial, sans-serif">
  <rect width="940" height="660" fill="#ffffff"/>

  <!-- Title -->
  <text x="470" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">Proposta de reprodução do Nest com ESP32 — Diagrama de blocos</text>
  <text x="470" y="56" text-anchor="middle" font-size="13" fill="#666666">Mapeamento conceitual das funcionalidades em componentes do ecossistema ESP-IDF</text>

  <!-- ===== Central: ESP32 ===== -->
  <rect x="375" y="250" width="190" height="150" rx="10" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  <text x="470" y="300" text-anchor="middle" font-size="22" font-weight="bold" fill="#ffffff">ESP32</text>
  <text x="470" y="324" text-anchor="middle" font-size="12" fill="#cfd8dc">(ESP32-C6 / H2:</text>
  <text x="470" y="340" text-anchor="middle" font-size="12" fill="#cfd8dc">rádio 802.15.4)</text>
  <text x="470" y="366" text-anchor="middle" font-size="12" fill="#9fe2bf">Wi-Fi · BLE</text>
  <text x="470" y="384" text-anchor="middle" font-size="12" fill="#9fe2bf">FreeRTOS · deep sleep</text>

  <!-- ===== Left column: sensores (entradas) ===== -->
  <!-- BME280 -->
  <rect x="25" y="90" width="255" height="50" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="40" y="112" font-size="14" font-weight="bold" fill="#0d47a1">BME280</text>
  <text x="40" y="130" font-size="11.5" fill="#37474f">Temperatura / umidade / pressão</text>
  <line x1="280" y1="115" x2="375" y2="280" stroke="#1976d2" stroke-width="1.5"/>
  <text x="318" y="188" text-anchor="middle" font-size="11" fill="#1976d2" font-weight="bold">I²C</text>

  <!-- BH1750 -->
  <rect x="25" y="165" width="255" height="50" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="40" y="187" font-size="14" font-weight="bold" fill="#0d47a1">BH1750</text>
  <text x="40" y="205" font-size="11.5" fill="#37474f">Luminosidade ambiente</text>
  <line x1="280" y1="190" x2="375" y2="295" stroke="#1976d2" stroke-width="1.5"/>
  <text x="332" y="232" text-anchor="middle" font-size="11" fill="#1976d2" font-weight="bold">I²C</text>

  <!-- PIR -->
  <rect x="25" y="240" width="255" height="50" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="40" y="262" font-size="14" font-weight="bold" fill="#0d47a1">PIR HC-SR501</text>
  <text x="40" y="280" font-size="11.5" fill="#37474f">Presença (near-field) — Auto-Away</text>
  <line x1="280" y1="265" x2="375" y2="320" stroke="#1976d2" stroke-width="1.5"/>
  <text x="330" y="284" text-anchor="middle" font-size="11" fill="#1976d2" font-weight="bold">GPIO</text>

  <!-- LD2410 -->
  <rect x="25" y="315" width="255" height="50" rx="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="40" y="337" font-size="14" font-weight="bold" fill="#0d47a1">mmWave LD2410</text>
  <text x="40" y="355" font-size="11.5" fill="#37474f">Presença estática (far-field)</text>
  <line x1="280" y1="340" x2="375" y2="345" stroke="#1976d2" stroke-width="1.5"/>
  <text x="330" y="330" text-anchor="middle" font-size="11" fill="#1976d2" font-weight="bold">UART</text>

  <!-- ===== Right column: interface + atuador ===== -->
  <!-- Display -->
  <rect x="660" y="150" width="255" height="50" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="675" y="172" font-size="14" font-weight="bold" fill="#1b5e20">Display TFT GC9A01</text>
  <text x="675" y="190" font-size="11.5" fill="#37474f">Tela circular 240×240 (visual do dial)</text>
  <line x1="565" y1="290" x2="660" y2="175" stroke="#388e3c" stroke-width="1.5"/>
  <text x="620" y="226" text-anchor="middle" font-size="11" fill="#388e3c" font-weight="bold">SPI</text>

  <!-- Encoder -->
  <rect x="660" y="240" width="255" height="50" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="675" y="262" font-size="14" font-weight="bold" fill="#1b5e20">Encoder EC11 + botão</text>
  <text x="675" y="280" font-size="11.5" fill="#37474f">Anel rotativo com clique</text>
  <line x1="565" y1="300" x2="660" y2="265" stroke="#388e3c" stroke-width="1.5"/>
  <text x="615" y="276" text-anchor="middle" font-size="11" fill="#388e3c" font-weight="bold">GPIO</text>

  <!-- Relay -->
  <rect x="660" y="330" width="255" height="50" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="675" y="352" font-size="14" font-weight="bold" fill="#bf360c">Módulo relé (1–3 canais)</text>
  <text x="675" y="370" font-size="11.5" fill="#37474f">Comando dos terminais W / Y / G</text>
  <line x1="565" y1="350" x2="660" y2="355" stroke="#e65100" stroke-width="1.5"/>
  <text x="615" y="340" text-anchor="middle" font-size="11" fill="#e65100" font-weight="bold">GPIO</text>

  <!-- HVAC -->
  <rect x="660" y="420" width="255" height="46" rx="8" fill="#fbe9e7" stroke="#bf360c" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="787" y="448" text-anchor="middle" font-size="13" font-weight="bold" fill="#bf360c">Sistema HVAC — 24 VAC</text>
  <line x1="787" y1="380" x2="787" y2="420" stroke="#bf360c" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Bottom: conectividade / nuvem ===== -->
  <rect x="345" y="470" width="250" height="54" rx="8" fill="#eceff1" stroke="#546e7a" stroke-width="1.5"/>
  <text x="470" y="492" text-anchor="middle" font-size="14" font-weight="bold" fill="#263238">Broker MQTT / App na nuvem</text>
  <text x="470" y="510" text-anchor="middle" font-size="11.5" fill="#37474f">Controle remoto e telemetria</text>
  <line x1="470" y1="400" x2="470" y2="470" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="440" font-size="11" fill="#546e7a" font-weight="bold">Wi-Fi</text>

  <!-- ===== Power note ===== -->
  <rect x="345" y="560" width="250" height="46" rx="8" fill="#fffde7" stroke="#f9a825" stroke-width="1.5"/>
  <text x="470" y="582" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#7f6000">Alimentação dedicada + bateria</text>
  <text x="470" y="599" text-anchor="middle" font-size="11" fill="#37474f">(substitui o power stealing do Nest)</text>
  <line x1="470" y1="524" x2="470" y2="560" stroke="#f9a825" stroke-width="1.5"/>

  <!-- Legend -->
  <text x="40" y="430" font-size="12" font-weight="bold" fill="#37474f">Legenda:</text>
  <rect x="40" y="440" width="16" height="14" fill="#e3f2fd" stroke="#1976d2"/>
  <text x="62" y="452" font-size="11.5" fill="#37474f">Sensores (entradas)</text>
  <rect x="40" y="460" width="16" height="14" fill="#e8f5e9" stroke="#388e3c"/>
  <text x="62" y="472" font-size="11.5" fill="#37474f">Interface (E/S)</text>
  <rect x="40" y="480" width="16" height="14" fill="#fff3e0" stroke="#e65100"/>
  <text x="62" y="492" font-size="11.5" fill="#37474f">Atuação / HVAC</text>

  <!-- arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#455a64"/>
    </marker>
  </defs>
</svg>
